        body {

        .overlay {

        .lyuk-container {
            position: relative;
            width: 150px;
            height: 150px;
            display: inline-block;
            cursor: pointer;
        }

        .lyuk {
            position: absolute;
            top: 0; left: 0;
            width: 150px;
            height: 150px;
            z-index: 1;
        }

        .vakond {
            position: absolute;
            padding-bottom: 50px;       
            width: 150px;
            height: 150px;
            z-index: 2;
            display: none;             
        }
    </style>
</head>
<body>

            <div class="collapse navbar-collapse" id="navbarNav">

                    <li class="nav-item"><a class="nav-link active" href="kocka.html">Kocka játék</a></li>
                    <li class="nav-item"><a class="nav-link" href="kinevetavegen.html">Ki nevet a végén</a></li>
                    <li class="nav-item"><a class="nav-link" href="whackamole.html">Whack a mole</a></li>

    <div class="overlay d-flex justify-content-center align-items-center p-3">
        <div class="game-box p-4 text-center" style="width: 500px;">
            <h1 class="mt-0">Csapd le a vakondot</h1>
            <table>
                <tr>
                    <td>
                        <div class="lyuk-container" id="l1">
                            <img src="img/whackamole/lyuk.png" class="lyuk" alt="">
                            <img src="img/whackamole/mole.png" class="vakond" alt="">
                        </div>
                    </td>
                    <td>
                        <div class="lyuk-container" id="l2">
                            <img src="img/whackamole/lyuk.png" class="lyuk" alt="">
                            <img src="img/whackamole/mole.png" class="vakond" alt="">
                        </div>
                    </td>
                    <td>
                        <div class="lyuk-container" id="l3">
                            <img src="img/whackamole/lyuk.png" class="lyuk" alt="">
                            <img src="img/whackamole/mole.png" class="vakond" alt="">
                        </div>
                    </td>
                </tr>
                <tr>
                    <td>
                        <div class="lyuk-container" id="l4">
                            <img src="img/whackamole/lyuk.png" class="lyuk" alt="">
                            <img src="img/whackamole/mole.png" class="vakond" alt="">
                        </div>
                    </td>
                    <td>
                        <div class="lyuk-container" id="l5">
                            <img src="img/whackamole/lyuk.png" class="lyuk" alt="">
                            <img src="img/whackamole/mole.png" class="vakond" alt="">
                        </div>
                    </td>
                    <td>
                        <div class="lyuk-container" id="l6">
                            <img src="img/whackamole/lyuk.png" class="lyuk" alt="">
                            <img src="img/whackamole/mole.png" class="vakond" alt="">
                        </div>
                    </td>
                </tr>
                <tr>
                    <td>
                        <div class="lyuk-container" id="l7">
                            <img src="img/whackamole/lyuk.png" class="lyuk" alt="">
                            <img src="img/whackamole/mole.png" class="vakond" alt="">
                        </div>
                    </td>
                    <td>
                        <div class="lyuk-container" id="l8">
                            <img src="img/whackamole/lyuk.png" class="lyuk" alt="">
                            <img src="img/whackamole/mole.png" class="vakond" alt="">
                        </div>
                    </td>
                    <td>
                        <div class="lyuk-container" id="l9">
                            <img src="img/whackamole/lyuk.png" class="lyuk" alt="">
                            <img src="img/whackamole/mole.png" class="vakond" alt="">
                        </div>
                    </td>
                </tr>
            </table>
            <h2 id="pontszam">Pontszám: 0</h2>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let score = 0;
        let vanVakond = false;
        let vakondlyuk = null;
        let specialisVakond = false;
        let pontszam = document.getElementById("pontszam");
        const lyukak = document.querySelectorAll(".lyuk-container");
        lyukak.forEach(lyuk => {
            lyuk.addEventListener("click", () => {
                if(lyuk === vakondlyuk && vanVakond) 
                {
                    if(specialisVakond) {
                        score += 5;
                        specialisVakond = false;
                    } else {
                        score++;
                    }
                    pontszam.textContent = `Pontszám: ${score}`;
                    vakondlyuk.querySelector(".vakond").style.display = "none";
                    vanVakond = false;
                }
            });
        });

        function randomLyuk() {
            const index = Math.floor(Math.random() * lyukak.length);
            return lyukak[index];
        }
        
        function GetRandomInt(min, max) {
            return Math.floor(Math.random() * (max - min) + min);
        }

        function GetDifficultyGameSpeed() {
            if(score < 15) return 1500;
            if(score < 30) return 1200;
            if(score < 45) return 900;
            if(score < 60) return 700;
            if(score < 75) return 500;
            if(score < 90) return 400;
            return 300;
        }
        
        function vakondMegjelenitese() {
            if(vanVakond) 
            {
                return;
            }
            vakondlyuk = randomLyuk();
            specialisVakond = GetRandomInt(1, 20) === 1;
            if(specialisVakond) {
                vakondlyuk.querySelector(".vakond").src = "img/whackamole/specmole.png";
            } else {
                vakondlyuk.querySelector(".vakond").src = "img/whackamole/mole.png";
            }
            vakondlyuk.querySelector(".vakond").style.display = "block";
            vanVakond = true;
            setTimeout(() => {
                if (vanVakond) {
                    vakondlyuk.querySelector(".vakond").style.display = "none";
                    vanVakond = false;
                }
            }, 1000);
            setTimeout(vakondMegjelenitese, GetDifficultyGameSpeed());
        }
        setInterval(vakondMegjelenitese, GetDifficultyGameSpeed());
    </script>
</body>
</html>
