<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kocka játék</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            margin: 0;
            background-image: url("img/bg.jpg");
            background-size: cover;
            background-repeat: no-repeat;
            background-attachment: fixed;
        }

        .overlay {
            background-color: rgba(0,0,0,0.4);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .game-box {
            background-color: rgba(255,255,255,0.9);
            border: 3px solid black;
            padding: 30px;
            width: 300px;
            text-align: center;
        }

        h1{
            border-bottom: 3px solid black;
            padding-bottom: 10px;
            color: black;
        }

        .navbar-custom {
            background-color: rgba(0,0,0,0.85);
            border-bottom: 3px solid black;
        }

        .nav-link {
            color: #ccc !important;
            font-weight: bold;
        }

        .nav-link:hover,
        .nav-link.active {
            color: #f1c40f !important;
        }

        .lyuk-container {
            position: relative;
            width: 150px;
            height: 150px;
            display: inline-block;
            cursor: pointer;
        }

        .lyuk {
            position: absolute;
            top: 0; left: 0;
            width: 150px;
            height: 150px;
            z-index: 1;
        }

        .vakond {
            position: absolute;
            padding-bottom: 50px;       
            width: 150px;
            height: 150px;
            z-index: 2;
            display: none;             
        }

        .gomb {
            background-color: rgb(107, 97, 97);
            color: white;
            font-weight: bold;
            border: black 2px solid;
            padding: 10px 20px;
            font-size: 16px;
        }

        .gomb:hover {
            background-color: rgb(107, 207, 24);
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-custom">
        <div class="container-fluid">
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link" href="index.html">Fő oldal</a></li>
                    <li class="nav-item"><a class="nav-link active" href="kocka.html">Kocka játék</a></li>
                    <li class="nav-item"><a class="nav-link" href="kinevetavegen.html">Ki nevet a végén</a></li>
                    <li class="nav-item"><a class="nav-link" href="whackamole.html">Whack a mole</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="overlay d-flex justify-content-center align-items-center p-3">
        <div class="game-box p-4 text-center" style="width: 500px;">
            <h1 class="mt-0">Csapd le a vakondot</h1>
            <div id="idozito-form" class="d-flex justify-content-center align-items-center gap-2 mb-3">
                <label id="idozitotext" for="idozito" class="mb-0 text-nowrap">Időzítő (mp):</label>
                <input type="text" name="idozito" id="idozito" class="form-control" style="width: 80px;">
                <button class="btn gomb" onclick="startGame()">Játék indítása</button>
            </div>
            <div id="infopanel" class="d-flex justify-content-center gap-4 mt-3" >
                <h2 id="ido" hidden class="m-0">Idő: 0</h2>
                <h2 id="pontszam" hidden class="m-0">Pontszám: 0</h2>
            </div>
            <table class="mx-auto mt-4" hidden>
                <tr>
                    <td>
                        <div class="lyuk-container" id="l1">
                            <img src="img/whackamole/lyuk.png" class="lyuk" alt="">
                            <img src="img/whackamole/mole.png" class="vakond" alt="">
                        </div>
                    </td>
                    <td>
                        <div class="lyuk-container" id="l2">
                            <img src="img/whackamole/lyuk.png" class="lyuk" alt="">
                            <img src="img/whackamole/mole.png" class="vakond" alt="">
                        </div>
                    </td>
                    <td>
                        <div class="lyuk-container" id="l3">
                            <img src="img/whackamole/lyuk.png" class="lyuk" alt="">
                            <img src="img/whackamole/mole.png" class="vakond" alt="">
                        </div>
                    </td>
                </tr>
                <tr>
                    <td>
                        <div class="lyuk-container" id="l4">
                            <img src="img/whackamole/lyuk.png" class="lyuk" alt="">
                            <img src="img/whackamole/mole.png" class="vakond" alt="">
                        </div>
                    </td>
                    <td>
                        <div class="lyuk-container" id="l5">
                            <img src="img/whackamole/lyuk.png" class="lyuk" alt="">
                            <img src="img/whackamole/mole.png" class="vakond" alt="">
                        </div>
                    </td>
                    <td>
                        <div class="lyuk-container" id="l6">
                            <img src="img/whackamole/lyuk.png" class="lyuk" alt="">
                            <img src="img/whackamole/mole.png" class="vakond" alt="">
                        </div>
                    </td>
                </tr>
                <tr>
                    <td>
                        <div class="lyuk-container" id="l7">
                            <img src="img/whackamole/lyuk.png" class="lyuk" alt="">
                            <img src="img/whackamole/mole.png" class="vakond" alt="">
                        </div>
                    </td>
                    <td>
                        <div class="lyuk-container" id="l8">
                            <img src="img/whackamole/lyuk.png" class="lyuk" alt="">
                            <img src="img/whackamole/mole.png" class="vakond" alt="">
                        </div>
                    </td>
                    <td>
                        <div class="lyuk-container" id="l9">
                            <img src="img/whackamole/lyuk.png" class="lyuk" alt="">
                            <img src="img/whackamole/mole.png" class="vakond" alt="">
                        </div>
                    </td>
                </tr>
            </table>
            <div id="EndGame"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let score = 0;
        let vanVakond = false;
        let vakondlyuk = null;
        let specialisVakond = false;
        let pontszam = document.getElementById("pontszam");
        const lyukak = document.querySelectorAll(".lyuk-container");
        let idozitoInput = document.getElementById("idozito");
        let idozito = 0;
        let idoKijelzo = document.getElementById("ido");
        let vegtelenMod = false;
        idozitoInput.addEventListener("change", () => {
            idozito = parseInt(idozitoInput.value);
        });
        lyukak.forEach(lyuk => {
            lyuk.addEventListener("click", () => {
                if(lyuk === vakondlyuk && vanVakond) 
                {
                    if(specialisVakond) {
                        score += 5;
                        specialisVakond = false;
                    } else {
                        score++;
                    }
                    pontszam.textContent = `Pontszám: ${score}`;
                    vakondlyuk.querySelector(".vakond").style.display = "none";
                    vanVakond = false;
                }
            });
        });

        function startGame() {
            score = 0;
            vanVakond = false;
            vakondlyuk = null;
            vegtelenMod = false;
            idozito = parseInt(idozitoInput.value) || 0;
            pontszam.textContent = `Pontszám: ${score}`;
            pontszam.hidden = false;
            document.querySelector("#idozitotext").hidden = true;
            document.querySelector("#idozito-form").hidden = true;
            document.querySelector("#idozito").hidden = true;
            document.querySelector("button.gomb").hidden = true;
            document.querySelector("table").hidden = false;
            idoKijelzo.hidden = false;
            idoKijelzo.textContent = `Idő: ${idozito}`;
            setTimeout(vakondMegjelenitese, 2000);
            if(idozito > 0) {
                setTimeout(idoSzamlalo, 1000);
            }
            else{
                vegtelenMod = true;
                idoKijelzo.textContent = "Végtelen mód";
            }
        }

        function randomLyuk() {
            const index = Math.floor(Math.random() * lyukak.length);
            return lyukak[index];
        }
        
        function GetRandomInt(min, max) {
            return Math.floor(Math.random() * (max - min) + min);
        }

        function GetDifficultyGameSpeed() {
            if(score < 15) return 1500;
            if(score < 30) return 1400;
            if(score < 45) return 1300;
            if(score < 60) return 1200;
            if(score < 75) return 1100;
            if(score < 90) return 1000;
            return 900;
        }
        
        function vakondMegjelenitese() {
            if(idozito <= 0 && !vegtelenMod) {
                return;
            }
            if(vanVakond) 
            {
                return;
            }
            vakondlyuk = randomLyuk();
            specialisVakond = GetRandomInt(1, 20) === 1;
            if(specialisVakond) {
                vakondlyuk.querySelector(".vakond").src = "img/whackamole/specmole.png";
            } else {
                vakondlyuk.querySelector(".vakond").src = "img/whackamole/mole.png";
            }
            vakondlyuk.querySelector(".vakond").style.display = "block";
            vanVakond = true;
            setTimeout(() => {
                if (vanVakond) {
                    vakondlyuk.querySelector(".vakond").style.display = "none";
                    vanVakond = false;
                }
            }, 1000);
            setTimeout(vakondMegjelenitese, GetDifficultyGameSpeed());
        }

        function idoSzamlalo() {
            if(idozito > 0) {
                idozito--;
                idoKijelzo.textContent = `Idő: ${idozito}`;
                setTimeout(idoSzamlalo, 1000);
            } else {
                idoKijelzo.textContent = "Idő lejárt!";
                document.querySelector("table").hidden = true;
                pontszam.hidden = true;
                document.getElementById("EndGame").innerHTML = `
                    <h2>Játék vége! Elért pontszám: ${score}</h2>
                    <button class="btn gomb mt-2" onclick="resetGame()">Újra</button>
                `;
            }
        }

        function resetGame() {
            document.getElementById("EndGame").innerHTML = "";
            idoKijelzo.hidden = true;
            idoKijelzo.textContent = "Idő: 0";
            pontszam.hidden = true;
            idozitoInput.value = "";
            idozito = 0;
            document.querySelector("#idozito-form").hidden = false;
            document.querySelector("#idozitotext").hidden = false;
            document.querySelector("#idozito").hidden = false;
            document.querySelector("button.gomb").hidden = false;
        }
    </script>
</body>
</html>
