<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kocka játék</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            margin: 0;
            background-image: url("img/bg.jpg");
            background-size: cover;
            background-repeat: no-repeat;
            background-attachment: fixed;
        }

        .overlay {
            background-color: rgba(0,0,0,0.4);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .game-box {
            background-color: rgba(255,255,255,0.9);
            border: 3px solid black;
            padding: 30px;
            width: 300px;
            text-align: center;
        }

        h1 {
            border-bottom: 3px solid black;
            padding-bottom: 10px;
            color: black;
        }

        #eredmeny {
            border: 2px solid black;
            background-color: #eee;
            color: black;
            font-weight: bold;
        }

        #historia {
            overflow-y: auto;
            max-height: 150px;
            border-top: 2px dashed #888;
            font-size: 0.9em;
            color: #444;
        }

        #historia p {
            margin: 5px 0;
            border-bottom: 1px solid #ddd;
        }

        .navbar-custom {
            background-color: rgba(0,0,0,0.85);
            border-bottom: 3px solid black;
        }

        .nav-link {
            color: #ccc !important;
            font-weight: bold;
        }

        .nav-link:hover,
        .nav-link.active {
            color: #f1c40f !important;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-custom">
        <div class="container-fluid">
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link" href="index.html">Fő oldal</a></li>
                    <li class="nav-item"><a class="nav-link active" href="kocka.html">Kocka játék</a></li>
                    <li class="nav-item"><a class="nav-link" href="kinevetavegen.html">Ki nevet a végén</a></li>
                    <li class="nav-item"><a class="nav-link" href="whackamole.html">Whack a mole</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="overlay d-flex justify-content-center align-items-center p-3">
        <div class="game-box p-4 text-center" style="width: 350px;">
            <h1 class="mt-0">Kocka játék</h1>
            <div class="d-flex justify-content-center align-items-center gap-3 mt-3">
                <img src="img/kockak/fk1.png" alt="Kocka" id="kocka1" />
                <button class="btn fw-bold px-4 py-2" style="border: 3px solid black; background-color: #f1c40f;" onclick="Dobas()">Dobás</button>
                <img src="img/kockak/fk1.png" alt="Kocka" id="kocka2" />
            </div>
            <div id="eredmeny" class="mt-3 p-2">Eredmény itt jelenik meg</div>
            <div id="historia" class="mt-3 pt-2">
                <strong>Korábbi dobások:</strong>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function Dobas() {
            let kocka1 = Number(Math.floor(Math.random() * 6) + 1);
            let kocka2 = Number(Math.floor(Math.random() * 6) + 1);
            document.getElementById("kocka1").src = `img/kockak/fk${kocka1}.png`;
            document.getElementById("kocka2").src = `img/kockak/fk${kocka2}.png`;
            if (kocka1 > kocka2) {
                document.getElementById("eredmeny").innerHTML = "Az első játékos nyert!";
            } else if (kocka2 > kocka1) {
                document.getElementById("eredmeny").innerHTML = "A második játékos nyert!";
            } else {
                document.getElementById("eredmeny").innerHTML = "Döntetlen!";
            }
            let historiatomb = document.getElementById("historia");
            const meccs = document.createElement("p");
            meccs.innerHTML = `Kocka 1: ${kocka1} - Kocka 2: ${kocka2}`;
            historiatomb.append(meccs);
        }
    </script>
</body>
</html>
