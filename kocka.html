<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-image: url("img/bg.jpg");
            background-size: cover;
            background-repeat: no-repeat;
            background-attachment: fixed;
        }

        .overlay {
            background-color: rgba(0,0,0,0.4);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .game-box {
            background-color: rgba(255,255,255,0.9);
            border: 3px solid black;
            padding: 30px;
            width: 300px;
            text-align: center;
        }

        h1 {
            margin-top: 0;
            border-bottom: 3px solid black;
            padding-bottom: 10px;
        }

        button {
            margin-top: 20px;
            padding: 10px 20px;
            border: 3px solid black;
            background-color: #f1c40f;
            cursor: pointer;
        }

        #eredmeny {
            margin-top: 20px;
            padding: 10px;
            border: 2px solid black;
            background-color: #eee;
        }
    </style>
</head>
<body>
    <div class="overlay">
        <div class="game-box">
            <h1>Kocka játék</h1>
            <img src="img/kockak/fk1.png" alt="Kocka" id="kocka1" />
            <button onclick="Dobas()">Dobás</button>
            <img src="img/kockak/fk1.png" alt="Kocka" id="kocka2" />
            <div id="eredmeny">Eredmény itt jelenik meg</div>
        </div>
    </div>
    <!--Majd később kocka dobás képek-->
    <div id="eredmeny"></div>
    <script>
        function Dobas() {
            let kocka1 = Number(Math.floor(Math.random() * 6) + 1);
            let kocka2 = Number(Math.floor(Math.random() * 6) + 1);
            document.getElementById("kocka1").src = `img/kockak/fk${kocka1}.png`;
            document.getElementById("kocka2").src = `img/kockak/fk${kocka2}.png`;
            if (kocka1 > kocka2) {
                document.getElementById("eredmeny").innerHTML = "Az első játékos nyert!";
            } else if (kocka2 > kocka1) {
                document.getElementById("eredmeny").innerHTML = "A második játékos nyert!";
            } else {
                document.getElementById("eredmeny").innerHTML = "Döntetlen! Kocka 1";
            }
        }
    </script>
</body>
</html>
