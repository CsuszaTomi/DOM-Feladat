<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ki nevet a végén</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            margin: 0;
            background-image: url("img/bg.jpg");
            background-size: cover;
            background-repeat: no-repeat;
            background-attachment: fixed;
        }

        .overlay {
            background-color: rgba(0,0,0,0.4);
            min-height: 100vh;
        }

        .game-box {
            background-color: rgba(255,255,255,0.9);
            border: 3px solid black;
        }

        h1 {
            border-bottom: 3px solid black;
            padding-bottom: 10px;
            color: black;
        }

        h2 {
            color: black;
            font-size: 18px;
            border-bottom: 2px solid black;
            padding-bottom: 10px;
        }

        .box {
            width: 200px;
            height: 200px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            border-radius: 6px;
            border: 3px solid black;
            cursor: pointer;
            transition: background-color 0.3s;
            color: white;
            font-weight: bold;
        }

        #box1 {
            background: green;
        }

        #eredmeny {
            border: 2px solid black;
            background-color: #eee;
            color: black;
            font-weight: bold;
            min-height: 30px;
        }

        .toplista-container {
            max-height: 200px;
            overflow-y: auto;
        }

        table th, table td {
            border: 2px solid black !important;
            color: black;
        }

        .navbar-custom {
            background-color: rgba(0,0,0,0.85);
            border-bottom: 3px solid black;
        }
 
        .nav-link {
            color: #ccc !important;
            font-weight: bold;
        }

        .nav-link:hover, .nav-link.active {
            color: #f1c40f !important;
        }

    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-custom">
        <div class="container-fluid">
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link" href="index.html">Fő oldal</a></li>
                    <li class="nav-item"><a class="nav-link" href="kocka.html">Kocka játék</a></li>
                    <li class="nav-item"><a class="nav-link active" href="kinevetavegen.html">Ki nevet a végén</a></li>
                    <li class="nav-item"><a class="nav-link" href="whackamole.html">Whack a mole</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="overlay d-flex justify-content-center align-items-center p-3">
        <div class="game-box p-4 text-center" style="width: 500px;">
            <h1 class="mt-0">Ki nevet a végén</h1>
            <div class="d-flex justify-content-center mt-3">
                <div class="box" id="box1">Nyomd le ha zöld!</div>
            </div>
            <div id="eredmeny" class="mt-3 p-2">Kattints a zöld négyzetre!</div>
            <div class="toplista-container mt-3">
                <table class="table table-bordered mb-0">
                    <thead>
                        <tr>
                            <th class="bg-warning">Helyezés</th>
                            <th class="bg-warning">Idő (ms)</th>
                        </tr>
                    </thead>
                    <tbody id="toplistaTabla">
                        <tr>
                            <td colspan="2" class="text-center">Még nincs eredmény</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let box1 = document.getElementById("box1");
        let eredmeny = document.getElementById("eredmeny");
        let toplistaTabla = document.getElementById("toplistaTabla");
        let zoldSzinIdeje = null;
        let toplista = [];
        const toplistaMaxHossz = 10;
        box1.addEventListener("click", Box1click);

        function ToplistaFrissites() {
            toplistaTabla.innerHTML = '';
            toplista.forEach((ido, index) => {
                const sor = document.createElement("tr");
                sor.innerHTML = `<td>${index + 1}.</td><td>${ido} ms</td>`;
                toplistaTabla.appendChild(sor);
            });
        }

        function UjIdoHozzaadasa(ido) {
            toplista.push(ido);
            toplista.sort((a, b) => a - b);
            if (toplista.length > toplistaMaxHossz) {
                toplista = toplista.slice(0, toplistaMaxHossz);
            }
            ToplistaFrissites();
        }

        function Box1click(e) {
            let currentColor = window.getComputedStyle(box1).backgroundColor;
            if (currentColor == "rgb(0, 128, 0)" && zoldSzinIdeje !== null) {
                let elteltIdo = Date.now() - zoldSzinIdeje;
                UjIdoHozzaadasa(elteltIdo);
                eredmeny.innerHTML = `Gratulálok! Elért idő: ${elteltIdo} ms`;
                eredmeny.style.backgroundColor = "#d4edda";
                zoldSzinIdeje = null;
            }
        }

        function GetRandomInt(min, max) {
            return Math.floor(Math.random() * (max - min) + min);
        }

        function Szinvaltas() {
            if (Math.random() < 0.2) {
                zoldSzinIdeje = Date.now();
                box1.style.backgroundColor = "rgb(0, 128, 0)";
                box1.innerHTML = "Most!";
                eredmeny.innerHTML = "Kattints a zöld négyzetre!";
                eredmeny.style.backgroundColor = "#eee";
            } else {
                box1.style.backgroundColor = `rgb(${GetRandomInt(0, 256)},${GetRandomInt(0, 256)},${GetRandomInt(0, 256)})`;
                box1.innerHTML = "Nyomd le ha zöld!";
                zoldSzinIdeje = null;
            }
        }

        setInterval(Szinvaltas, 1500);
    </script>
</body>
</html>
