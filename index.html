<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Játék választó</title>
    <style>
        body {
            overflow-x: hidden;
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #2c3e50;
            color: white;
            background-image: url("img/bg.jpg");
            background-size: cover;
            background-repeat: no-repeat;
        }

        h1 {
            text-align: center;
            margin: 20px;
            color: #f1c40f;
        }

        .overlay {
            background-color: rgba(0,0,0,0.2);
            min-height: 100vh;
            padding-top: 20px;
        }

        .card {
            border: 3px solid black;
            background-color: rgba(255,255,255,0.9);
            height: 100%;
        }

        .card-title {
            text-align: center;
            border-bottom: 3px solid black;
            padding: 10px;
            margin: 0;
            color: black;
        }

        .card-text {
            text-align: center;
            padding: 15px;
            color: black;
        }

        .gomb {
            display: block;
            width: 120px;
            margin: 10px auto 15px auto;
            padding: 8px;
            text-align: center;
            border: 3px solid black;
            border-radius: 20px;
            text-decoration: none;
            color: black;
            background-color: #f1c40f;
        }
    </style>
</head>
<body>
    <div class="overlay">

        <h1>Játék választó</h1>

        <div class="container mt-5">
            <div class="row justify-content-center g-4">

                <div class="col-md-3">
                    <div class="card">
                        <h5 class="card-title">Kocka játék</h5>
                        <div class="card-body">
                            <p class="card-text">Dobj a kockával és próbálj szerencsét!</p>
                            <a href="kocka.html" class="gomb">Indítás</a>
                        </div>
                    </div>
                </div>

                <div class="col-md-3">
                    <div class="card">
                        <h5 class="card-title">Ki nevet a végén</h5>
                        <div class="card-body">
                            <p class="card-text">Klasszikus társasjáték online verzióban.</p>
                            <a href="kinevetavegen.html" class="gomb">Indítás</a>
                        </div>
                    </div>
                </div>

                <div class="col-md-3">
                    <div class="card">
                        <h5 class="card-title">Whac-A-Mole</h5>
                        <div class="card-body">
                            <p class="card-text">Üsd le a vakondokat minél gyorsabban!</p>
                            <a href="whackamole.html" class="gomb">Indítás</a>
                        </div>
                    </div>
                </div>

            </div>
        </div>

    </div>
</body>
</html>
