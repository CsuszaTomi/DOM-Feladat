<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Játék választó</title>
    <style>
        body {
            overflow-x: hidden;
            margin: 0;
            background-image: url("img/bg.jpg");
            background-size: cover;
            background-repeat: no-repeat;
        }

        .overlay {
            background-color: rgba(0,0,0,0.4);
            min-height: 100vh;
        }

        .card {
            border: 3px solid black !important;
            background-color: rgba(255,255,255,0.9);
            height: 100%;
        }

        .card-title {
            text-align: center;
            border-bottom: 3px solid black;
            padding: 10px;
            margin: 0;
            color: black;
        }

        .card-text {
            text-align: center;
            color: black;
        }

        .gomb {
            display: block;
            width: 120px;
            margin: 10px auto 15px auto;
            padding: 8px;
            text-align: center;
            border: 3px solid black;
            border-radius: 20px;
            text-decoration: none;
            color: black;
            background-color: #f1c40f;
            font-weight: bold;
        }

        .gomb:hover {
            background-color: #d4ac0d;
            color: black;
        }

        .navbar-custom {
            background-color: rgba(0,0,0,0.85);
            border-bottom: 3px solid black;
        }

        .nav-link {
            color: #ccc !important;
            font-weight: bold;
        }

        .nav-link:hover,
        .nav-link.active {
            color: #f1c40f !important;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-custom">
        <div class="container-fluid">

                    <li class="nav-item"><a class="nav-link" href="kocka.html">Kocka játék</a></li>
                    <li class="nav-item"><a class="nav-link" href="kinevetavegen.html">Ki nevet a végén</a></li>

        </div>
    </nav>

        <div class="container mt-5">

                        <div class="card-body">
